<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Grupo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #000000;
        }

        /* Header */
        .grupo-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-button {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            text-decoration: none;
        }

        .back-button svg {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            fill: none;
        }

        .grupo-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .grupo-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grupo-avatar svg {
            width: 22px;
            height: 22px;
            stroke: rgba(255, 255, 255, 0.5);
        }

        .grupo-info {
            flex: 1;
        }

        .grupo-nome {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #007AFF;
            border-radius: 9px;
            color: white;
            font-size: 10px;
            margin-left: 4px;
        }

        .verified-badge svg {
            width: 10px;
            height: 10px;
            stroke: white;
            stroke-width: 2.5;
            fill: none;
        }

        .grupo-meta {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Posts Area */
        .posts-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            background: #000000;
        }

        .post {
            display: flex;
            flex-direction: column;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            position: relative;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .post-author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .post-author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-author-info {
            flex: 1;
        }

        .post-author-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .post-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Texto */
        .post-content {
            font-size: 15px;
            color: #ffffff;
            line-height: 1.5;
            margin: 4px 0 8px;
            word-break: break-word;
        }

        /* Imagem */
        .post-media {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin: 8px 0;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Link */
        .post-link {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .post-link a {
            color: #007AFF;
            text-decoration: none;
            font-size: 14px;
            word-break: break-all;
        }

        .post-link a:hover {
            text-decoration: underline;
        }

        /* Stats */
        .post-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .stat-item svg {
            width: 16px;
            height: 16px;
            stroke: rgba(255, 255, 255, 0.5);
            fill: none;
        }

        /* Mensagem de visualização apenas */
        .view-only-message {
            position: sticky;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            z-index: 90;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }

        /* Media Modal */
        .media-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .media-modal.active {
            display: flex;
        }

        .media-modal img, .media-modal video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .close-media {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            cursor: pointer;
            font-size: 20px;
        }

        /* Scrollbar */
        .posts-area::-webkit-scrollbar {
            width: 4px;
        }

        .posts-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .posts-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="grupo-header">
            <a href="javascript:history.back()" class="back-button">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="grupo-avatar" id="grupoAvatar">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                </svg>
            </div>
            <div class="grupo-info">
                <div class="grupo-nome" id="grupoNome">Carregando...</div>
                <div class="grupo-meta" id="grupoMeta">GRUPO DE PRÉVIA</div>
            </div>
        </div>

        <!-- Posts Area -->
        <div class="posts-area" id="postsArea">
            <div class="loading">Carregando posts...</div>
        </div>

        <!-- Mensagem de visualização apenas -->
        <div class="view-only-message">
            <svg viewBox="0 0 24 24" width="16" height="16" style="stroke: currentColor; margin-right: 4px; vertical-align: middle;">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Você está visualizando este grupo. Apenas o administrador pode postar.
        </div>
    </div>

    <!-- Media Modal -->
    <div class="media-modal" id="mediaModal" onclick="closeMediaModal()">
        <span class="close-media" onclick="closeMediaModal()">✕</span>
        <img id="modalImage" src="" alt="" style="display: none;">
        <video id="modalVideo" controls style="display: none;"></video>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ygptfdflmrgennajulwt.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncHRmZGZsbXJnZW5uYWp1bHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzY0MDcsImV4cCI6MjA4ODY1MjQwN30.QObFx4MM5oNlBL9bYM5WBQabnXDVxHZrUgaT15efD4g'

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        const params = new URLSearchParams(window.location.search)
        const hash = params.get('hash')

        if (!hash) {
            alert('Link inválido!')
            window.location.href = 'index.html'
        }

        let grupo = null
        let vendedorData = null
        let posts = []
        const leadId = 'lead_' + Math.random().toString(36).substring(2, 15)

        function showToast(message) {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 2000)
        }

        function escapeHtml(text) {
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }

        async function loadVendedor(vendedorId) {
            const { data } = await supabaseClient
                .from('vendedores')
                .select('*')
                .eq('id', vendedorId)
                .single()
            
            vendedorData = data
            return data
        }

        async function loadGrupo() {
            const { data } = await supabaseClient
                .from('grupos')
                .select('*')
                .eq('link_hash', hash)
                .single()

            if (!data) {
                alert('Grupo não encontrado!')
                window.location.href = 'index.html'
                return
            }

            grupo = data
            
            // Carregar dados do vendedor
            const vendedor = await loadVendedor(grupo.vendedor_id)
            
            // Mostrar nome do grupo com selo do vendedor
            const nomeSpan = document.getElementById('grupoNome')
            if (vendedor?.verified) {
                nomeSpan.innerHTML = `${escapeHtml(grupo.nome)} 
                    <span class="verified-badge" title="Vendedor Verificado">
                        <svg viewBox="0 0 24 24">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </span>`
            } else {
                nomeSpan.textContent = grupo.nome
            }
            
            document.getElementById('grupoMeta').textContent = grupo.descricao || 'GRUPO DE PRÉVIA'
            
            if (grupo.foto_url) {
                document.getElementById('grupoAvatar').innerHTML = `<img src="${grupo.foto_url}" alt="Avatar">`
            }

            await loadPosts()
            await registrarVisualizacao()
        }

        async function loadPosts() {
            const { data } = await supabaseClient
                .from('postagens')
                .select('*')
                .eq('grupo_id', grupo.id)
                .order('created_at', { ascending: false })

            posts = data || []
            renderPosts()
        }

        function renderPosts() {
            const area = document.getElementById('postsArea')
            
            if (posts.length === 0) {
                area.innerHTML = `
                    <div class="loading">
                        <p>Nenhuma postagem ainda</p>
                    </div>
                `
                return
            }

            area.innerHTML = posts.map(post => formatarPost(post)).join('')
        }

        function formatarPost(post) {
            const data = new Date(post.created_at).toLocaleDateString('pt-BR')
            
            let conteudoHtml = ''
            
            if (post.tipo === 'texto') {
                conteudoHtml = `<div class="post-content">${escapeHtml(post.conteudo)}</div>`
            } else if (post.tipo === 'imagem') {
                conteudoHtml = `
                    <img src="${escapeHtml(post.conteudo)}" class="post-media" onclick="openMedia('${escapeHtml(post.conteudo)}', 'image')">
                `
            } else if (post.tipo === 'video') {
                conteudoHtml = `
                    <video controls class="post-media" onclick="openMedia('${escapeHtml(post.conteudo)}', 'video')">
                        <source src="${escapeHtml(post.conteudo)}" type="video/mp4">
                    </video>
                `
            } else if (post.tipo === 'link') {
                try {
                    const linkData = JSON.parse(post.conteudo)
                    conteudoHtml = `
                        <div class="post-link">
                            <a href="${escapeHtml(linkData.url)}" target="_blank">${escapeHtml(linkData.texto || linkData.url)}</a>
                        </div>
                    `
                } catch {
                    conteudoHtml = `
                        <div class="post-link">
                            <a href="${escapeHtml(post.conteudo)}" target="_blank">${escapeHtml(post.conteudo)}</a>
                        </div>
                    `
                }
            }

            return `
                <div class="post" id="post-${post.id}">
                    <div class="post-header">
                        <div class="post-author-avatar">
                            ${grupo.foto_url ? `<img src="${grupo.foto_url}">` : ''}
                        </div>
                        <div class="post-author-info">
                            <div class="post-author-name">${escapeHtml(grupo.nome)}</div>
                            <div class="post-time">${data}</div>
                        </div>
                    </div>
                    ${conteudoHtml}
                    <div class="post-stats">
                        <div class="stat-item">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            </svg>
                            ${post.visualizacoes || 0}
                        </div>
                    </div>
                </div>
            `
        }

        async function registrarVisualizacao() {
            if (posts.length === 0) return
            
            try {
                await supabaseClient
                    .from('visualizacoes')
                    .insert({
                        postagem_id: posts[0]?.id,
                        lead_id: leadId
                    })
                
                // Atualizar contador de visualizações
                const { error } = await supabaseClient.rpc('incrementar_visualizacao', {
                    postagem_id: posts[0]?.id
                })
                
                if (error) console.error('Erro ao incrementar:', error)
                
            } catch (error) {
                console.error('Erro ao registrar visualização:', error)
            }
        }

        window.openMedia = function(src, tipo) {
            document.getElementById('mediaModal').classList.add('active')
            if (tipo === 'image') {
                document.getElementById('modalImage').src = src
                document.getElementById('modalImage').style.display = 'block'
                document.getElementById('modalVideo').style.display = 'none'
            } else {
                document.getElementById('modalVideo').src = src
                document.getElementById('modalVideo').style.display = 'block'
                document.getElementById('modalImage').style.display = 'none'
            }
        }

        window.closeMediaModal = function() {
            document.getElementById('mediaModal').classList.remove('active')
            const video = document.getElementById('modalVideo')
            if (video) video.pause()
        }

        async function init() {
            await loadGrupo()
            
            if (grupo) {
                supabaseClient
                    .channel(`grupo:${grupo.id}`)
                    .on('postgres_changes', 
                        { 
                            event: 'INSERT', 
                            schema: 'public', 
                            table: 'postagens',
                            filter: `grupo_id=eq.${grupo.id}`
                        },
                        () => {
                            loadPosts()
                        }
                    )
                    .subscribe()
            }
        }

        init()
    </script>
</body>
</html>
