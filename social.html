<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Social</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #000000;
            position: relative;
        }

        /* Header */
        .top-nav {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .logo-text strong {
            font-weight: 700;
            color: #ffffff;
        }

        .logo-text span {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
        }

        .user-greeting {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-avatar:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-avatar svg {
            width: 22px;
            height: 22px;
            stroke: rgba(255, 255, 255, 0.6);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: #000000;
            padding-bottom: 70px;
        }

        /* Stories Row */
        .stories-row {
            padding: 16px 20px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stories-row::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .story-item:hover {
            transform: translateY(-2px);
        }

        .story-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-avatar svg {
            width: 32px;
            height: 32px;
            stroke: rgba(255, 255, 255, 0.4);
        }

        .story-name {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Post Card */
        .post-card {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .post-card:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-author-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .post-author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-author-avatar svg {
            width: 24px;
            height: 24px;
            stroke: rgba(255, 255, 255, 0.4);
        }

        .post-author-info {
            flex: 1;
        }

        .post-author-name {
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .verified-badge {
            width: 16px;
            height: 16px;
            background: #007AFF;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
        }

        .post-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }

        .post-content {
            font-size: 15px;
            line-height: 1.5;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .post-media {
            width: 100%;
            border-radius: 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .post-stats {
            display: flex;
            gap: 24px;
            padding-top: 12px;
            margin-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .stat-btn:hover {
            color: #ffffff;
        }

        .stat-btn.liked {
            color: #ff3b30;
        }

        .stat-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
        }

        .stat-btn.liked svg {
            fill: #ff3b30;
        }

        /* Feed */
        .feed {
            padding: 0;
        }

        .empty-feed {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-feed svg {
            width: 64px;
            height: 64px;
            stroke: rgba(255, 255, 255, 0.2);
            margin-bottom: 16px;
        }

        /* Sugestões */
        .suggestions {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            margin: 20px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .suggestions-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .suggestions-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .show-more {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .show-more:hover {
            color: #ffffff;
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .suggestion-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .suggestion-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .suggestion-avatar svg {
            width: 28px;
            height: 28px;
            stroke: rgba(255, 255, 255, 0.4);
        }

        .suggestion-info {
            flex: 1;
        }

        .suggestion-name {
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .suggestion-username {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .suggestion-bio {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }

        .follow-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .follow-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.98);
        }

        .follow-btn.following {
            background: rgba(0, 122, 255, 0.2);
            border-color: #007AFF;
            color: #007AFF;
        }

        .follow-btn.disabled {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            cursor: default;
        }

        .ver-mais-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ver-mais-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 20px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
            cursor: pointer;
            flex: 1;
            max-width: 80px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #ffffff;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* Modal de criar */
        .create-modal {
            display: none;
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 8px;
            z-index: 150;
            backdrop-filter: blur(20px);
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
            animation: fadeInUp 0.2s ease;
        }

        .create-modal.active {
            display: flex;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .create-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .create-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .create-option svg {
            width: 22px;
            height: 22px;
            stroke: #ffffff;
        }

        .create-option span {
            font-size: 15px;
            font-weight: 500;
            color: #ffffff;
        }

        /* Perfil */
        .profile-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 3px solid rgba(255, 255, 255, 0.1);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .profile-username {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }

        .profile-bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 16px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .profile-stat {
            text-align: center;
            cursor: pointer;
        }

        .profile-stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .profile-stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .edit-profile-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .profile-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-tab.active {
            color: #007AFF;
            border-bottom: 2px solid #007AFF;
        }

        .profile-posts {
            padding: 0;
        }

        .empty-profile {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Modal de notificação */
        .notification-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .notification-modal.active {
            display: flex;
        }

        .notification-content {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            max-width: 350px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }

        .notification-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
        }

        .notification-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .notification-text {
            flex: 1;
        }

        .notification-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .notification-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Modal de seguidores/seguindo */
        .followers-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .followers-modal.active {
            display: flex;
        }

        .followers-content {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            max-width: 350px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }

        .followers-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .followers-header h3 {
            font-size: 18px;
        }

        .followers-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .follower-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .follower-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            cursor: pointer;
        }

        .follower-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .follower-info {
            flex: 1;
        }

        .follower-name {
            font-weight: 600;
            cursor: pointer;
        }

        .follower-username {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .close-modal {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Seções */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            color: #000000;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }

        .toast.success {
            background: #34C759;
            color: white;
        }

        .toast.error {
            background: #ff3b30;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="top-nav">
            <div class="logo-area">
                <div class="logo-wrapper">
                    <div class="logo-icon">
                        <img src="ei_1773333191455-removebg-preview.png" alt="KEYGRAM">
                    </div>
                    <div class="logo-text">
                        <strong>KEY</strong><span>GRAM</span>
                    </div>
                </div>
                <div class="user-greeting" id="userGreeting">Olá! Carregando...</div>
            </div>
            <div class="top-actions">
                <div class="user-avatar" id="userAvatar" onclick="goToMyProfile()">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area" id="mainContent">
            <!-- Seção Início -->
            <div id="inicioSection" class="section active">
                <div class="stories-row" id="storiesRow">
                    <div class="story-item" id="createStoryBtn">
                        <div class="story-avatar">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="16"/>
                                <line x1="8" y1="12" x2="16" y2="12"/>
                            </svg>
                        </div>
                        <span class="story-name">Adicionar</span>
                    </div>
                </div>
                <div class="feed" id="feed">
                    <div class="loading">Carregando posts...</div>
                </div>
                <div class="suggestions">
                    <div class="suggestions-header">
                        <div class="suggestions-title">Conectar</div>
                        <div class="show-more" onclick="verMais()">Ver todos</div>
                    </div>
                    <div class="suggestions-list" id="suggestionsList">
                        <div class="loading">Carregando...</div>
                    </div>
                </div>
            </div>

            <!-- Seção Notificações -->
            <div id="notificacoesSection" class="section">
                <div class="empty-feed" id="notificacoesList">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <p>Carregando notificações...</p>
                </div>
            </div>

            <!-- Seção Perfil -->
            <div id="perfilSection" class="section">
                <div id="profileContent">
                    <div class="loading">Carregando perfil...</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" data-section="inicio" onclick="switchSection('inicio')">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Início</span>
            </div>
            <div class="nav-item" data-section="notificacoes" onclick="switchSection('notificacoes')">
                <svg viewBox="0 0 24 24">

        // ========== FUNÇÕES GERAIS ==========
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.className = 'toast show ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '')
            setTimeout(() => toast.classList.remove('show'), 3000)
        }

        function escapeHtml(text) {
            if (!text) return ''
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }

        function formatarData(data) {
            const date = new Date(data)
            const now = new Date()
            const diff = now - date
            const minutos = Math.floor(diff / 60000)
            const horas = Math.floor(diff / 3600000)
            const dias = Math.floor(diff / 86400000)

            if (minutos < 1) return 'Agora mesmo'
            if (minutos < 60) return `${minutos} min`
            if (horas < 24) return `${horas} h`
            if (dias < 7) return `${dias} d`
            return date.toLocaleDateString('pt-BR')
        }

        // ========== NAVEGAÇÃO ==========

            if (section === 'inicio') {

        // ========== SEGUIR/DEIXAR DE SEGUIR ==========
        async function toggleFollow(targetUserId, buttonElement) {
            if (!currentUser) {
                showToast('Faça login primeiro', 'error')
                return
            }

            const isFollowing = followingList.includes(targetUserId)

            try {
                if (isFollowing) {
                    await supabaseClient
                        .from('seguidores')
                        .delete()
                        .eq('seguidor_id', currentUser.id)
                        .eq('seguindo_id', targetUserId)
                    
                    followingList = followingList.filter(id => id !== targetUserId)
                    buttonElement.classList.remove('following')
                    buttonElement.textContent = 'Seguir'
                    showToast('Deixou de seguir', 'success')
                } else {
                    await supabaseClient
                        .from('seguidores')
                        .insert({
                            seguidor_id: currentUser.id,
                            seguindo_id: targetUserId
                        })
                    
                    followingList.push(targetUserId)
                    buttonElement.classList.add('following')
                    buttonElement.textContent = 'Seguindo'
                    showToast('Agora você está seguindo', 'success')

                    // Criar notificação
                    await supabaseClient
                        .from('notificacoes')
                        .insert({
                            user_id: targetUserId,
                            tipo: 'follow',
                            de_user_id: currentUser.id,
                            de_user_nome: currentVendedor?.nome || 'Alguém',
                            de_user_foto: currentVendedor?.foto_url,
                            lida: false,
                            created_at: new Date().toISOString()
                        })
                }

                if (profileViewUserId === targetUserId) {
                    loadProfile(targetUserId)
                }
                loadSuggestions()
            } catch (error) {
                console.error('Erro:', error)
                showToast('Erro ao seguir/deixar de seguir', 'error')
            }
        }

        // ========== POSTS ==========
        async function loadPosts() {

        async function likePost(postId, buttonElement, likesSpan) {
            const post = posts.find(p => p.id === postId)
            if (!post) return

            const userLiked = post.user_liked

            try {
                if (userLiked) {
                    await supabaseClient
                        .from('curtidas')
                        .delete()
                        .eq('post_id', postId)
                        .eq('user_id', currentUser.id)
                    
                    post.likes = (post.likes || 0) - 1
                    post.user_liked = false
                } else {
                    await supabaseClient
                        .from('curtidas')
                        .insert({
                            post_id: postId,
                            user_id: currentUser.id
                        })
                    
                    post.likes = (post.likes || 0) + 1
                    post.user_liked = true

                    if (post.user_id !== currentUser.id) {
                        await supabaseClient
                            .from('notificacoes')
                            .insert({
                                user_id: post.user_id,
                                tipo: 'like',
                                post_id: postId,
                                de_user_id: currentUser.id,
                                de_user_nome: currentVendedor?.nome || 'Alguém',
                                de_user_foto: currentVendedor?.foto_url,
                                lida: false,
                                created_at: new Date().toISOString()
                            })
                    }
                }

                likesSpan.textContent = post.likes || 0
                if (post.user_liked) {
                    buttonElement.classList.add('liked')
                } else {
                    buttonElement.classList.remove('liked')
                }

            } catch (error) {
                console.error('Erro ao curtir:', error)
            }
        }

        // ========== NOTIFICAÇÕES ==========
        async function loadNotifications() {
            try {
                const { data, error } = await supabaseClient
                    .from('notificacoes')
                    .select('*')
                    .eq('user_id', currentUser?.id)
                    .order('created_at', { ascending: false })
                    .limit(50)

                if (error) throw error

                notifications = data || []

                await supabaseClient
                    .from('notificacoes')
                    .update({ lida: true })
                    .eq('user_id', currentUser?.id)
                    .eq('lida', false)

                renderNotifications()
            } catch (error) {
                console.error('Erro ao carregar notificações:', error)
                document.getElementById('notificacoesList').innerHTML = `
                    <div class="empty-feed">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <p>Erro ao carregar notificações</p>
                    </div>
                `
            }
        }

        function renderNotifications() {
            const container = document.getElementById('notificacoesList')
            
            if (!notifications || notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-feed">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <p>Nenhuma notificação</p>
                    </div>
                `
                return
            }

            container.innerHTML = notifications.map(notif => {
                let mensagem = ''
                if (notif.tipo === 'follow') {
                    mensagem = `${notif.de_user_nome || 'Alguém'} começou a seguir você`
                } else if (notif.tipo === 'like') {
                    mensagem = `${notif.de_user_nome || 'Alguém'} curtiu seu post`
                } else {
                    mensagem = notif.mensagem || 'Nova notificação'
                }

                return `
                    <div class="notification-item" onclick="${notif.de_user_id ? `goToUserProfile('${notif.de_user_id}')` : ''}">
                        <div class="notification-avatar">
                            ${notif.de_user_foto 
                                ? `<img src="${notif.de_user_foto}" alt="${escapeHtml(notif.de_user_nome)}">`
                                : `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>`
                            }
                        </div>
                        <div class="notification-text">
                            <div class="notification-title">${escapeHtml(mensagem)}</div>
                            <div class="notification-time">${formatarData(notif.created_at)}</div>
                        </div>
                    </div>
                `
            }).join('')
        }

        // ========== SUGESTÕES ==========
        async function loadSuggestions() {
            try {
                const { data: users, error } = await supabaseClient
                    .from('vendedores')
                    .select('*')
                    .limit(10)

                if (error) throw error

                const filteredUsers = users.filter(u => u.id !== currentUser?.id && !followingList.includes(u.id))
                
                const maxAckley = filteredUsers.filter(u => 
                    u.nome?.toLowerCase().includes('max') || 
                    u.nome?.toLowerCase().includes('ackley')
                )
                maxAckley.forEach(u => u.verified = true)
                
                const outros = filteredUsers.filter(u => 
                    !u.nome?.toLowerCase().includes('max') && 
                    !u.nome?.toLowerCase().includes('ackley')
                )

                allUsers = [...maxAckley, ...outros]
                renderSuggestions(allUsers.slice(0, 4))
            } catch (error) {
                console.error('Erro:', error)
            }
        }

        function renderSuggestions(users) {
            const suggestionsList = document.getElementById('suggestionsList')
            
            if (!users || users.length === 0) {
                suggestionsList.innerHTML = `
                    <div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.4);">
                        Nenhuma sugestão no momento
                    </div>
                `
                return
            }

            suggestionsList.innerHTML = users.map(user => `
                <div class="suggestion-item">
                    <div class="suggestion-avatar" onclick="goToUserProfile('${user.id}')">
                        ${user.foto_url 
                            ? `<img src="${user.foto_url}" alt="${escapeHtml(user.nome)}">`
                            : `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>`
                        }
                    </div>
                    <div class="suggestion-info" onclick="goToUserProfile('${user.id}')">
                        <div class="suggestion-name">
                            ${escapeHtml(user.nome || 'Usuário')}
                            ${user.verified ? '<span class="verified-badge">✓</span>' : ''}
                        </div>
                        <div class="suggestion-username">@${escapeHtml(user.link_hash?.slice(0, 12) || 'usuario')}</div>
                        ${user.descricao ? `<div class="suggestion-bio">${escapeHtml(user.descricao.substring(0, 40))}${user.descricao.length > 40 ? '...' : ''}</div>` : ''}
                    </div>
                    <button class="follow-btn" onclick="toggleFollow('${user.id}', this)">Seguir</button>
                </div>
            `).join('')
        }

        function verMais() {
            renderSuggestions(allUsers)
        }

        // ========== MODAIS ==========

            try {
                let data
                if (tipo === 'seguidores') {
                    const { data: seguidores } = await supabaseClient
                        .from('seguidores')
                        .select('seguidor_id')
                        .eq('seguindo_id', userId)
                    
                    const seguidoresIds = seguidores?.map(s => s.seguidor_id) || []
                    const { data: users } = await supabaseClient
                        .from('vendedores')
                        .select('*')
                        .in('id', seguidoresIds)
                    
                    data = users
                } else {
                    const { data: seguindo } = await supabaseClient
                        .from('seguidores')
                        .select('seguindo_id')
                        .eq('seguidor_id', userId)
                    
                    const seguindoIds = seguindo?.map(s => s.seguindo_id) || []
                    const { data: users } = await supabaseClient
                        .from('vendedores')
                        .select('*')
                        .in('id', seguindoIds)
                    
                    data = users
                }

                const modalHtml = `
                    <div class="followers-modal active" id="followersModal" onclick="closeFollowersModalOnClick(event)">
                        <div class="followers-content">
                            <div class="followers-header">
                                <h3>${tipo === 'seguidores' ? 'Seguidores' : 'Seguindo'}</h3>
                                <div class="close-modal" onclick="closeFollowersModal()">✕</div>
                            </div>
                            <div class="followers-list">
                                ${data?.map(user => `
                                    <div class="follower-item" onclick="goToUserProfile('${user.id}'); closeFollowersModal()">
                                        <div class="follower-avatar">
                                            ${user.foto_url 
                                                ? `<img src="${user.foto_url}" alt="${escapeHtml(user.nome)}">`
                                                : `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>`
                                            }
                                        </div>
                                        <div class="follower-info">
                                            <div class="follower-name">${escapeHtml(user.nome || 'Usuário')}</div>
                                            <div class="follower-username">@${escapeHtml(user.link_hash?.slice(0, 12) || 'usuario')}</div>
                                        </div>
                                    </div>
                                `).join('') || '<div style="text-align: center; padding: 20px;">Nenhum usuário</div>'}
                            </div>
                        </div>
                    </div>
                `

                if (!document.getElementById('followersModal')) {
                    document.body.insertAdjacentHTML('beforeend', modalHtml)
                } else {
                    document.getElementById('followersModal').outerHTML = modalHtml
                }

            } catch (error) {
                console.error('Erro:', error)
            }
        }

        function closeFollowersModal() {
            const modal = document.getElementById('followersModal')
            if (modal) modal.remove()
        }

        function closeFollowersModalOnClick(event) {
            if (event.target === event.currentTarget) {
                closeFollowersModal()
            }
        }

        // ========== CARREGAR USUÁRIO ATUAL ==========
        async function loadCurrentUser() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser()
                if (!user) {
                    window.location.href = 'index.html'
                    return
                }

                currentUser = user

                const { data: vendedor } = await supabaseClient
                    .from('vendedores')
                    .select('*')
                    .eq('id', user.id)
                    .single()

                currentVendedor = vendedor

                document.getElementById('userGreeting').textContent = `Olá! ${vendedor?.nome || 'Usuário'}`

                if (vendedor?.foto_url) {
                    const avatar = document.getElementById('userAvatar')
                    avatar.innerHTML = `<img src="${vendedor.foto_url}" alt="Avatar">`
                }

                // Carregar lista de quem o usuário segue
                const { data: seguindo } = await supabaseClient
                    .from('seguidores')
                    .select('seguindo_id')
                    .eq('seguidor_id', user.id)

                followingList = seguindo?.map(s => s.seguindo_id) || []

                // Carregar likes do usuário
                const { data: curtidas } = await supabaseClient
                    .from('curtidas')
                    .select('post_id')
                    .eq('user_id', user.id)

                const likedPostIds = curtidas?.map(c => c.post_id) || []

                // Marcar posts curtidos pelo usuário
                window.likedPostIds = likedPostIds

                loadPosts()
                loadSuggestions()

            } catch (error) {
                console.error('Erro:', error)
                window.location.href = 'index.html'
            }
        }

        // ========== FUNÇÕES DE CRIAÇÃO ==========
        function toggleCreateModal() {
            document.getElementById('createModal').classList.toggle('active')
        }

        function criarPost() {
            document.getElementById('createModal').classList.remove('active')
            window.location.href = 'post.html'
        }

        function criarReel() {
            document.getElementById('createModal').classList.remove('active')
            window.location.href = 'reel.html'
        }

        function showComingSoon() {
            showToast('Em breve!', 'info')
        }

        // ========== EVENTOS ==========
        document.getElementById('createStoryBtn').addEventListener('click', function(e) {
            e.stopPropagation()
            toggleCreateModal()
        })

        document.addEventListener('click', function(e) {
            const modal = document.getElementById('createModal')
            const storyBtn = document.getElementById('createStoryBtn')
            if (modal && modal.classList.contains('active')) {
                if (!storyBtn.contains(e.target) && !modal.contains(e.target)) {
                    modal.classList.remove('active')
                }
            }
        })

        // ========== INICIALIZAR ==========
        loadCurrentUser()
    </script>
</body>
  </html>
