<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Atendimento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #ffffff;
        }

        .chat-header {
            padding: 20px 24px 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .back-button svg {
            width: 22px;
            height: 22px;
            stroke: #000000;
        }

        .lead-info {
            flex: 1;
        }

        .lead-name {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 2px;
        }

        .lead-status {
            font-size: 13px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lead-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafafa;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.vendor {
            align-self: flex-end;
        }

        .message.lead {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .message.vendor .message-bubble {
            background: #000000;
            color: #ffffff;
            border-bottom-right-radius: 6px;
        }

        .message.lead .message-bubble {
            background: #f0f0f0;
            color: #000000;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Estilo para mensagens com imagem */
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-image:hover {
            transform: scale(1.05);
        }

        .message-time {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        /* Input Area com botão de mídia */
        .input-area {
            background: #ffffff;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 16px 20px 20px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .media-button {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: transparent;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            color: #8e8e93;
        }

        .media-button:hover {
            background: rgba(0, 0, 0, 0.02);
            border-color: #000000;
            color: #000000;
        }

        .media-button svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 24px;
            padding: 4px 4px 4px 18px;
            display: flex;
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: #000000;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            background: transparent;
            outline: none;
        }

        .send-button {
            width: 44px;
            height: 44px;
            border: none;
            background: #000000;
            color: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2;
        }

        .send-button:hover {
            background: #1a1a1a;
            transform: scale(0.95);
        }

        .send-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }

        /* Modal de pré-visualização de imagem */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="chat-header">
            <a href="painel.html" class="back-button">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="lead-info">
                <div class="lead-name" id="leadName">Carregando...</div>
                <div class="lead-status">Online</div>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="loading">Carregando mensagens...</div>
        </div>

        <div class="input-area">
            <!-- Botão para enviar mídia -->
            <button class="media-button" onclick="showMediaOptions()" id="mediaButton" title="Enviar foto ou vídeo">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
            </button>
            
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Digite sua resposta..." autocomplete="off">
            </div>
            <button class="send-button" onclick="sendMessage()" id="sendButton">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Input file escondido -->
    <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" onchange="handleFileSelect(event)">

    <!-- Modal de pré-visualização de imagem -->
    <div class="image-modal" id="imageModal" onclick="this.classList.remove('active')">
        <span class="close-modal" onclick="document.getElementById('imageModal').classList.remove('active')">✕</span>
        <img id="modalImage" src="" alt="">
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ygptfdflmrgennajulwt.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncHRmZGZsbXJnZW5uYWp1bHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzY0MDcsImV4cCI6MjA4ODY1MjQwN30.QObFx4MM5oNlBL9bYM5WBQabnXDVxHZrUgaT15efD4g'

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        const params = new URLSearchParams(window.location.search)
        const conversaId = params.get('conv')

        if (!conversaId) {
            window.location.href = 'painel.html'
        }

        let user = null

        function showToast(message) {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 2000)
        }

        function escapeHtml(text) {
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }

        // Função para formatar mensagem (texto ou imagem)
        function formatMessage(msg) {
            const isImage = msg.conteudo?.startsWith('http') && 
                          (msg.conteudo.includes('.jpg') || msg.conteudo.includes('.png') || 
                           msg.conteudo.includes('.jpeg') || msg.conteudo.includes('.gif'));
            
            const isVideo = msg.conteudo?.startsWith('http') && 
                          (msg.conteudo.includes('.mp4') || msg.conteudo.includes('.mov'));
            
            if (isImage) {
                return `<img src="${escapeHtml(msg.conteudo)}" class="message-image" onclick="openImageModal('${escapeHtml(msg.conteudo)}')">`;
            } else if (isVideo) {
                return `<video controls style="max-width:200px; max-height:200px; border-radius:16px;">
                           <source src="${escapeHtml(msg.conteudo)}" type="video/mp4">
                        </video>`;
            } else {
                return escapeHtml(msg.conteudo);
            }
        }

        window.openImageModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        async function checkUser() {
            const { data: { user: currentUser } } = await supabaseClient.auth.getUser()
            user = currentUser
            if (!user) {
                window.location.href = 'index.html'
                return false
            }
            return true
        }

        async function loadConversa() {
            const { data: conversa } = await supabaseClient
                .from('conversas')
                .select('*, vendedores!inner(nome)')
                .eq('id', conversaId)
                .single()

            if (conversa) {
                document.getElementById('leadName').textContent = `Lead #${conversa.lead_id.slice(0, 8)}`
            }

            await loadMessages()
            subscribeToMessages()
        }

        async function loadMessages() {
            const { data: messages } = await supabaseClient
                .from('mensagens')
                .select('*')
                .eq('conversa_id', conversaId)
                .order('created_at', { ascending: true })

            const area = document.getElementById('messagesArea')
            
            if (!messages || messages.length === 0) {
                area.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #8e8e93;">
                        Nenhuma mensagem ainda. Envie algo para o lead!
                    </div>
                `
                // GARANTIR QUE O SCROLL APAREÇA
                setTimeout(() => {
                    area.scrollTop = area.scrollHeight;
                }, 100);
                return
            }

            area.innerHTML = messages.map(msg => `
                <div class="message ${msg.remetente}">
                    <div class="message-bubble">${formatMessage(msg)}</div>
                    <div class="message-time">${new Date(msg.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
                </div>
            `).join('')

            // SCROLL AUTOMÁTICO PARA O FUNDO
            setTimeout(() => {
                area.scrollTop = area.scrollHeight;
            }, 100);
        }

        function subscribeToMessages() {
            supabaseClient
                .channel(`conversa:${conversaId}`)
                .on('postgres_changes', 
                    { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'mensagens',
                        filter: `conversa_id=eq.${conversaId}`
                    },
                    (payload) => {
                        const area = document.getElementById('messagesArea')
                        
                        const msgDiv = document.createElement('div')
                        msgDiv.className = `message ${payload.new.remetente}`
                        msgDiv.innerHTML = `
                            <div class="message-bubble">${formatMessage(payload.new)}</div>
                            <div class="message-time">${new Date(payload.new.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
                        `
                        area.appendChild(msgDiv)
                        
                        // SCROLL AUTOMÁTICO PARA A NOVA MENSAGEM
                        setTimeout(() => {
                            area.scrollTop = area.scrollHeight;
                        }, 50);
                    }
                )
                .subscribe()
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput')
            const texto = input.value.trim()
            
            if (!texto) return

            const sendButton = document.getElementById('sendButton')
            sendButton.disabled = true

            const { error } = await supabaseClient
                .from('mensagens')
                .insert({
                    conversa_id: conversaId,
                    remetente: 'vendedor',
                    conteudo: texto
                })

            if (error) {
                showToast('Erro ao enviar mensagem')
            }

            input.value = ''
            sendButton.disabled = false
            
            // Scroll automático após enviar
            setTimeout(() => {
                document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
            }, 50);
        }

        // Funções para envio de mídia
        window.showMediaOptions = function() {
            document.getElementById('fileInput').click();
        }

        window.handleFileSelect = async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Verificar tipo
            const isImage = file.type.startsWith('image/');
            const isVideo = file.type.startsWith('video/');
            
            if (!isImage && !isVideo) {
                showToast('Formato não suportado. Use imagens ou vídeos.');
                return;
            }

            // Verificar tamanho
            if (file.size > 10 * 1024 * 1024) { // 10MB
                showToast('Arquivo muito grande. Máximo 10MB.');
                return;
            }

            showToast('Enviando arquivo...');

            try {
                // Converter para base64
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async function() {
                    const base64 = reader.result;
                    
                    // Salvar mensagem
                    const { error } = await supabaseClient
                        .from('mensagens')
                        .insert({
                            conversa_id: conversaId,
                            remetente: 'vendedor',
                            conteudo: base64
                        });

                    if (error) throw error;
                    
                    showToast('Arquivo enviado!');
                    
                    // Limpar input
                    document.getElementById('fileInput').value = '';
                };
            } catch (error) {
                showToast('Erro ao enviar arquivo');
            }
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage()
            }
        })

        async function init() {
            const loggedIn = await checkUser()
            if (loggedIn) {
                await loadConversa()
            }
        }

        init()
    </script>
</body>
    </html>
