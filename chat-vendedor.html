<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Atendimento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #ffffff;
        }

        .chat-header {
            padding: 20px 24px 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .back-button svg {
            width: 22px;
            height: 22px;
            stroke: #000000;
        }

        .lead-info {
            flex: 1;
        }

        .lead-name {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 2px;
        }

        .lead-status {
            font-size: 13px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lead-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafafa;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.vendor {
            align-self: flex-end;
        }

        .message.lead {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .message.vendor .message-bubble {
            background: #000000;
            color: #ffffff;
            border-bottom-right-radius: 6px;
        }

        .message.lead .message-bubble {
            background: #f0f0f0;
            color: #000000;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .message-time {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .input-area {
            background: #ffffff;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 16px 20px 20px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 24px;
            padding: 4px 4px 4px 18px;
            display: flex;
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: #000000;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            padding: 12px 0;
            font-size: 15px;
            background: transparent;
            outline: none;
        }

        .send-button {
            width: 44px;
            height: 44px;
            border: none;
            background: #000000;
            color: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2;
        }

        .send-button:hover {
            background: #1a1a1a;
            transform: scale(0.95);
        }

        .send-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
            font-size: 14px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="chat-header">
            <a href="painel.html" class="back-button">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="lead-info">
                <div class="lead-name" id="leadName">Carregando...</div>
                <div class="lead-status">Online</div>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="loading">Carregando mensagens...</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Digite sua resposta..." autocomplete="off">
            </div>
            <button class="send-button" onclick="sendMessage()" id="sendButton">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ygptfdflmrgennajulwt.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncHRmZGZsbXJnZW5uYWp1bHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzY0MDcsImV4cCI6MjA4ODY1MjQwN30.QObFx4MM5oNlBL9bYM5WBQabnXDVxHZrUgaT15efD4g'

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        const params = new URLSearchParams(window.location.search)
        const conversaId = params.get('conv')

        if (!conversaId) {
            window.location.href = 'painel.html'
        }

        let user = null

        function showToast(message) {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 2000)
        }

        function escapeHtml(text) {
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }

        async function checkUser() {
            const { data: { user: currentUser } } = await supabaseClient.auth.getUser()
            user = currentUser
            if (!user) {
                window.location.href = 'index.html'
                return false
            }
            return true
        }

        async function loadConversa() {
            const { data: conversa } = await supabaseClient
                .from('conversas')
                .select('*, vendedores!inner(nome)')
                .eq('id', conversaId)
                .single()

            if (conversa) {
                document.getElementById('leadName').textContent = `Lead #${conversa.lead_id.slice(0, 8)}`
            }

            await loadMessages()
            subscribeToMessages()
        }

        async function loadMessages() {
            const { data: messages } = await supabaseClient
                .from('mensagens')
                .select('*')
                .eq('conversa_id', conversaId)
                .order('created_at', { ascending: true })

            const area = document.getElementById('messagesArea')
            
            if (!messages || messages.length === 0) {
                area.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #8e8e93;">
                        Nenhuma mensagem ainda. Envie algo para o lead!
                    </div>
                `
                return
            }

            area.innerHTML = messages.map(msg => `
                <div class="message ${msg.remetente}">
                    <div class="message-bubble">${escapeHtml(msg.conteudo)}</div>
                    <div class="message-time">${new Date(msg.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
                </div>
            `).join('')

            area.scrollTop = area.scrollHeight
        }

        function subscribeToMessages() {
            supabaseClient
                .channel(`conversa:${conversaId}`)
                .on('postgres_changes', 
                    { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'mensagens',
                        filter: `conversa_id=eq.${conversaId}`
                    },
                    (payload) => {
                        const area = document.getElementById('messagesArea')
                        
                        const msgDiv = document.createElement('div')
                        msgDiv.className = `message ${payload.new.remetente}`
                        msgDiv.innerHTML = `
                            <div class="message-bubble">${escapeHtml(payload.new.conteudo)}</div>
                            <div class="message-time">${new Date(payload.new.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
                        `
                        area.appendChild(msgDiv)
                        area.scrollTop = area.scrollHeight
                    }
                )
                .subscribe()
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput')
            const texto = input.value.trim()
            
            if (!texto) return

            const sendButton = document.getElementById('sendButton')
            sendButton.disabled = true

            const { error } = await supabaseClient
                .from('mensagens')
                .insert({
                    conversa_id: conversaId,
                    remetente: 'vendedor',
                    conteudo: texto
                })

            if (error) {
                showToast('Erro ao enviar mensagem')
            }

            input.value = ''
            sendButton.disabled = false
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage()
            }
        })

        async function init() {
            const loggedIn = await checkUser()
            if (loggedIn) {
                await loadConversa()
            }
        }

        init()
    </script>
</body>
</html>
