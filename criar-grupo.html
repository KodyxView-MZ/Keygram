<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Novo Grupo</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="ei_1773333191455-removebg-preview.png">
    <link rel="apple-touch-icon" href="ei_1773333191455-removebg-preview.png">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://keygram.vercel.app/">
    <meta property="og:title" content="KEYGRAM - Criar Grupo">
    <meta property="og:description" content="Crie um grupo para compartilhar com seus leads">
    <meta property="og:image" content="https://keygram.vercel.app/ei_1773333191455-removebg-preview.png">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#000000">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #000000;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: #ffffff;
        }

        .back-button svg {
            width: 22px;
            height: 22px;
            stroke: #ffffff;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            flex: 1;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            background: #000000;
        }

        /* Upload Area */
        .upload-area {
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .upload-icon {
            margin-bottom: 12px;
        }

        .upload-icon svg {
            width: 48px;
            height: 48px;
            stroke: rgba(255, 255, 255, 0.5);
        }

        .upload-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .upload-text strong {
            color: #ffffff;
        }

        .preview-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto;
        }

        .preview-image {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ff3b30;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }

        .remove-image:hover {
            background: #ff2418;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            font-size: 15px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        textarea.form-input {
            min-height: 100px;
            resize: vertical;
        }

        /* Info Box */
        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .info-title {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-title svg {
            width: 18px;
            height: 18px;
            stroke: rgba(255, 255, 255, 0.8);
        }

        .info-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
        }

        .btn-primary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.99);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Loading state */
        .btn-loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }

        .toast.error {
            background: rgba(255, 59, 48, 0.9);
        }

        .toast.success {
            background: rgba(52, 199, 89, 0.9);
        }

        /* Scrollbar */
        .content-area::-webkit-scrollbar {
            width: 4px;
        }

        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <a href="painel.html" class="back-button">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1>Novo grupo</h1>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Upload Area -->
            <div class="upload-area" onclick="triggerUpload()" id="uploadArea">
                <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                <div class="preview-container">
                    <div class="upload-icon" id="uploadIcon">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </div>
                    <img id="imagePreview" class="preview-image" src="" alt="Preview">
                    <div class="remove-image" id="removeImage" onclick="removeImage(event)">✕</div>
                </div>
                <div class="upload-text">
                    <strong>Foto do grupo</strong><br>
                    <span id="uploadHint">Clique para adicionar uma imagem</span>
                </div>
            </div>

            <!-- Form -->
            <div class="form-group">
                <label class="form-label">Nome do grupo</label>
                <input type="text" class="form-input" id="grupoNome" placeholder="Ex: Lançamento Verão 2025" maxlength="50">
            </div>

            <div class="form-group">
                <label class="form-label">Descrição</label>
                <textarea class="form-input" id="grupoDescricao" placeholder="Sobre o que é este grupo... (opcional)" maxlength="200"></textarea>
            </div>

            <!-- Info Box -->
            <div class="info-box">
                <div class="info-title">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="12" x2="12" y2="16"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    Sobre os grupos
                </div>
                <div class="info-text">
                    • Os leads poderão ver as postagens mas não poderão interagir<br>
                    • Você pode postar textos, imagens, vídeos e links<br>
                    • O link do grupo será gerado automaticamente
                </div>
            </div>

            <!-- Buttons -->
            <button class="btn btn-primary" onclick="criarGrupo()" id="criarBtn">Criar grupo</button>
            <a href="painel.html" class="btn btn-outline" style="text-decoration: none; text-align: center;">Cancelar</a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://ygptfdflmrgennajulwt.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncHRmZGZsbXJnZW5uYWp1bHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzY0MDcsImV4cCI6MjA4ODY1MjQwN30.QObFx4MM5oNlBL9bYM5WBQabnXDVxHZrUgaT15efD4g'

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        let user = null
        let fotoBase64 = null
        let fotoFile = null

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.className = 'toast ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '')
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 3000)
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('criarBtn')
            if (isLoading) {
                btn.classList.add('btn-loading')
                btn.disabled = true
            } else {
                btn.classList.remove('btn-loading')
                btn.disabled = false
            }
        }

        // Verificar se usuário está logado
        async function checkUser() {
            const { data: { user: currentUser } } = await supabaseClient.auth.getUser()
            user = currentUser
            
            if (!user) {
                showToast('Faça login primeiro', 'error')
                setTimeout(() => {
                    window.location.href = 'index.html'
                }, 1500)
                return false
            }
            return true
        }

        // Upload de imagem
        window.triggerUpload = function() {
            document.getElementById('imageUpload').click()
        }

        window.handleImageUpload = function(event) {
            const file = event.target.files[0]
            if (!file) return

            if (!file.type.match('image.*')) {
                showToast('Apenas imagens são permitidas', 'error')
                return
            }

            if (file.size > 2 * 1024 * 1024) {
                showToast('Imagem deve ter no máximo 2MB', 'error')
                return
            }

            fotoFile = file

            const reader = new FileReader()
            reader.onload = (e) => {
                fotoBase64 = e.target.result
                const preview = document.getElementById('imagePreview')
                const uploadIcon = document.getElementById('uploadIcon')
                const removeBtn = document.getElementById('removeImage')
                const uploadHint = document.getElementById('uploadHint')

                preview.src = e.target.result
                preview.style.display = 'block'
                uploadIcon.style.display = 'none'
                removeBtn.style.display = 'flex'
                uploadHint.textContent = file.name
            }
            reader.readAsDataURL(file)
        }

        window.removeImage = function(event) {
            event.stopPropagation()
            fotoFile = null
            fotoBase64 = null
            
            const preview = document.getElementById('imagePreview')
            const uploadIcon = document.getElementById('uploadIcon')
            const removeBtn = document.getElementById('removeImage')
            const uploadHint = document.getElementById('uploadHint')
            const fileInput = document.getElementById('imageUpload')

            preview.style.display = 'none'
            preview.src = ''
            uploadIcon.style.display = 'block'
            removeBtn.style.display = 'none'
            uploadHint.textContent = 'Clique para adicionar uma imagem'
            fileInput.value = ''
        }

        // Upload da foto para o Storage
        async function uploadFoto(file) {
            const fileExt = file.name.split('.').pop()
            const fileName = `${user.id}_${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`
            const filePath = `grupos/${fileName}`

            const { error } = await supabaseClient.storage
                .from('keygram')
                .upload(filePath, file)

            if (error) throw error

            const { data: { publicUrl } } = supabaseClient.storage
                .from('keygram')
                .getPublicUrl(filePath)

            return publicUrl
        }

        // Criar grupo
        window.criarGrupo = async function() {
            if (!await checkUser()) return

            const nome = document.getElementById('grupoNome').value.trim()
            const descricao = document.getElementById('grupoDescricao').value.trim()

            if (!nome) {
                showToast('Digite um nome para o grupo', 'error')
                return
            }

            if (nome.length < 3) {
                showToast('O nome deve ter pelo menos 3 caracteres', 'error')
                return
            }

            setLoading(true)

            try {
                // Gerar hash único
                const hash = Math.random().toString(36).substring(2, 15) + 
                            Math.random().toString(36).substring(2, 15)

                let fotoUrl = null

                // Upload da foto se existir
                if (fotoFile) {
                    try {
                        fotoUrl = await uploadFoto(fotoFile)
                    } catch (error) {
                        console.error('Erro ao enviar foto:', error)
                        showToast('Erro ao enviar imagem, mas o grupo será criado', 'error')
                    }
                }

                // Inserir no banco
                const { data, error } = await supabaseClient
                    .from('grupos')
                    .insert({
                        vendedor_id: user.id,
                        nome: nome,
                        descricao: descricao || null,
                        link_hash: hash,
                        foto_url: fotoUrl,
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single()

                if (error) throw error

                showToast('Grupo criado com sucesso!', 'success')
                
                // Redirecionar para a página do grupo
                setTimeout(() => {
                    window.location.href = `grupo.html?hash=${hash}`
                }, 1500)

            } catch (error) {
                console.error('Erro ao criar grupo:', error)
                showToast('Erro ao criar grupo: ' + error.message, 'error')
                setLoading(false)
            }
        }

        // Inicializar
        checkUser()
    </script>
</body>
  </html>
