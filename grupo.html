<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Grupo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #ffffff;
        }

        /* Header */
        .grupo-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-button {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
        }

        .back-button svg {
            width: 24px;
            height: 24px;
            stroke: #000000;
            fill: none;
        }

        .grupo-avatar {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }

        .grupo-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grupo-avatar svg {
            width: 22px;
            height: 22px;
            stroke: #8e8e93;
        }

        .grupo-info {
            flex: 1;
        }

        .grupo-nome {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 2px;
        }

        .grupo-meta {
            font-size: 12px;
            color: #8e8e93;
        }

        .menu-button {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000000;
        }

        .menu-button svg {
            width: 20px;
            height: 20px;
            stroke: #000000;
            fill: none;
        }

        /* Posts Area */
        .posts-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            background: #ffffff;
        }

        .post {
            display: flex;
            flex-direction: column;
            width: 100%;
            border-bottom: 1px solid #f0f0f0;
            padding: 16px;
            position: relative;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .post-author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: #f5f5f5;
            overflow: hidden;
            border: 1px solid #f0f0f0;
        }

        .post-author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-author-info {
            flex: 1;
        }

        .post-author-name {
            font-size: 14px;
            font-weight: 600;
            color: #000000;
        }

        .post-time {
            font-size: 11px;
            color: #8e8e93;
        }

        /* Botão de apagar */
        .delete-post-btn {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: transparent;
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }

        .delete-post-btn:hover {
            background: #ff3b30;
            border-color: #ff3b30;
        }

        .delete-post-btn:hover svg {
            stroke: #ffffff;
        }

        .delete-post-btn svg {
            width: 18px;
            height: 18px;
            stroke: #ff3b30;
            fill: none;
        }

        /* Texto */
        .post-content {
            font-size: 15px;
            color: #000000;
            line-height: 1.5;
            margin: 4px 0 8px;
            word-break: break-word;
        }

        /* Imagem */
        .post-media {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            background: #f5f5f5;
            border-radius: 16px;
            margin: 8px 0;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }

        /* Link */
        .post-link {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #f0f0f0;
        }

        .post-link a {
            color: #007AFF;
            text-decoration: none;
            font-size: 14px;
            word-break: break-all;
        }

        .post-link a:hover {
            text-decoration: underline;
        }

        /* Stats */
        .post-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #8e8e93;
        }

        .stat-item svg {
            width: 16px;
            height: 16px;
            stroke: #8e8e93;
            fill: none;
        }

        /* Input Area */
        .input-area {
            background: #ffffff;
            border-top: 1px solid #f0f0f0;
            padding: 12px 16px;
        }

        .media-tools {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .media-btn {
            background: transparent;
            border: none;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .media-btn svg {
            width: 22px;
            height: 22px;
            stroke: #000000;
            fill: none;
        }

        .text-input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .text-input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #f0f0f0;
            border-radius: 24px;
            font-size: 15px;
            background: #f5f5f5;
            color: #000000;
            outline: none;
        }

        .text-input-wrapper input::placeholder {
            color: #8e8e93;
        }

        .text-input-wrapper input:focus {
            border-color: #000000;
            background: #ffffff;
        }

        .send-button {
            width: 44px;
            height: 44px;
            border: none;
            background: #000000;
            color: #ffffff;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .send-button svg {
            width: 22px;
            height: 22px;
            stroke: #ffffff;
            fill: none;
        }

        .send-button:disabled {
            background: #cccccc;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
            border: 1px solid #f0f0f0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #f0f0f0;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: #f5f5f5;
            border: 1px solid #f0f0f0;
            cursor: pointer;
            color: #000000;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #8e8e93;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            font-size: 14px;
            background: #f5f5f5;
            color: #000000;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #000000;
            background: #ffffff;
        }

        .upload-area {
            border: 1px dashed #cccccc;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background: #f5f5f5;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .upload-area svg {
            width: 32px;
            height: 32px;
            stroke: #8e8e93;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 13px;
            color: #8e8e93;
        }

        .upload-text strong {
            color: #000000;
        }

        .preview-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            margin: 10px auto;
            display: none;
        }

        .link-container {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            border: 1px solid #f0f0f0;
        }

        .link-label {
            font-size: 11px;
            color: #8e8e93;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .link-value {
            font-size: 13px;
            color: #007AFF;
            word-break: break-all;
            padding: 8px;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary {
            background: #000000;
            color: #ffffff;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #f0f0f0;
            color: #000000;
        }

        .btn-outline:hover {
            background: #f5f5f5;
        }

        .btn-danger {
            background: #ff3b30;
            color: #ffffff;
        }

        .hidden {
            display: none;
        }

        /* Media Preview */
        .media-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .media-modal.active {
            display: flex;
        }

        .media-modal img, .media-modal video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .close-media {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            cursor: pointer;
            font-size: 20px;
        }

        /* Confirm Delete Modal */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 400;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 320px;
            text-align: center;
        }

        .confirm-content p {
            margin: 16px 0;
            color: #000;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="grupo-header">
            <a href="javascript:history.back()" class="back-button">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="grupo-avatar" id="grupoAvatar" onclick="openSettings()">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                </svg>
            </div>
            <div class="grupo-info">
                <div class="grupo-nome" id="grupoNome">Carregando...</div>
                <div class="grupo-meta" id="grupoMeta">GRUPO DE PRÉVIA</div>
            </div>
            <div class="menu-button" onclick="openSettings()" id="menuButton">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="2" fill="#000000"/>
                    <circle cx="20" cy="12" r="2" fill="#000000"/>
                    <circle cx="4" cy="12" r="2" fill="#000000"/>
                </svg>
            </div>
        </div>

        <!-- Posts Area -->
        <div class="posts-area" id="postsArea">
            <div class="loading">Carregando posts...</div>
        </div>

        <!-- Input Area (só visível para o vendedor) -->
        <div class="input-area" id="inputArea">
            <div class="media-tools">
                <button class="media-btn" onclick="selectMedia('image')">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    Foto
                </button>
                <button class="media-btn" onclick="selectMedia('video')">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <polygon points="23 7 16 12 23 17 23 7"/>
                    </svg>
                    Vídeo
                </button>
                <button class="media-btn" onclick="showLinkInput()">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    Link
                </button>
            </div>
            <div class="text-input-wrapper">
                <input type="text" id="postInput" placeholder="Escreva algo..." autocomplete="off">
                <button class="send-button" onclick="sendPost()" id="sendButton">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Inputs escondidos -->
    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleMediaSelect(event, 'image')">
    <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleMediaSelect(event, 'video')">

    <!-- Modal de Configurações -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurar grupo</h2>
                <button class="close-btn" onclick="closeSettings()">✕</button>
            </div>
            
            <div class="upload-area" onclick="triggerGrupoUpload()">
                <input type="file" id="grupoImageUpload" accept="image/*" style="display: none;" onchange="handleGrupoImageUpload(event)">
                <svg viewBox="0 0 24 24" width="32" height="32">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                <div class="upload-text">
                    <strong>Foto do grupo</strong><br>
                    <span id="grupoUploadHint">Clique para adicionar</span>
                </div>
                <img id="grupoImagePreview" class="preview-image" src="" alt="Preview">
            </div>
            
            <div class="input-group">
                <label class="input-label">Nome do grupo</label>
                <input type="text" id="grupoNomeInput" placeholder="Ex: LANÇAMENTO VERÃO">
            </div>

            <div class="input-group">
                <label class="input-label">Descrição</label>
                <textarea id="grupoDescricaoInput" placeholder="Sobre o grupo..."></textarea>
            </div>

            <!-- Link do grupo -->
            <div class="link-container" id="grupoLinkContainer">
                <div class="link-label">LINK DO GRUPO</div>
                <div class="link-value" id="grupoLinkDisplay" onclick="copyGrupoLink()">Carregando...</div>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" onclick="closeSettings()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveGrupoSettings()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Link -->
    <div class="modal" id="linkModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adicionar link</h2>
                <button class="close-btn" onclick="closeLinkModal()">✕</button>
            </div>
            
            <div class="input-group">
                <label class="input-label">URL</label>
                <input type="url" id="linkUrl" placeholder="https://...">
            </div>

            <div class="input-group">
                <label class="input-label">Texto (opcional)</label>
                <input type="text" id="linkText" placeholder="Clique aqui">
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" onclick="closeLinkModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="sendLink()">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="confirm-modal" id="confirmDeleteModal">
        <div class="confirm-content">
            <h3>Apagar postagem?</h3>
            <p>Esta ação não pode ser desfeita.</p>
            <div class="confirm-buttons">
                <button class="btn btn-outline" onclick="cancelDelete()">Cancelar</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Apagar</button>
            </div>
        </div>
    </div>

    <!-- Media Preview Modal -->
    <div class="media-modal" id="mediaModal" onclick="closeMediaModal()">
        <span class="close-media" onclick="closeMediaModal()">✕</span>
        <img id="modalImage" src="" alt="" style="display: none;">
        <video id="modalVideo" controls style="display: none;"></video>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ygptfdflmrgennajulwt.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlncHRmZGZsbXJnZW5uYWp1bHd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzY0MDcsImV4cCI6MjA4ODY1MjQwN30.QObFx4MM5oNlBL9bYM5WBQabnXDVxHZrUgaT15efD4g'

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

        const params = new URLSearchParams(window.location.search)
        const hash = params.get('hash')

        if (!hash) {
            alert('Link inválido!')
            window.location.href = 'index.html'
        }

        let grupo = null
        let user = null
        let isProprietario = false
        let posts = []
        let postToDelete = null
        const leadId = 'lead_' + Math.random().toString(36).substring(2, 15)

        function showToast(message) {
            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 2000)
        }

        function escapeHtml(text) {
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML
        }

        async function checkUser() {
            const { data: { user: currentUser } } = await supabaseClient.auth.getUser()
            user = currentUser
            return !!user
        }

        async function uploadMedia(file, tipo) {
            const fileExt = file.name.split('.').pop()
            const fileName = `${grupo.id}_${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`
            const filePath = `grupos/${grupo.id}/${tipo}/${fileName}`

            const { error } = await supabaseClient.storage
                .from('keygram')
                .upload(filePath, file)

            if (error) throw error

            const { data: { publicUrl } } = supabaseClient.storage
                .from('keygram')
                .getPublicUrl(filePath)

            return publicUrl
        }

        async function loadGrupo() {
            const { data } = await supabaseClient
                .from('grupos')
                .select('*')
                .eq('link_hash', hash)
                .single()

            if (!data) {
                alert('Grupo não encontrado!')
                window.location.href = 'index.html'
                return
            }

            grupo = data
            
            document.getElementById('grupoNome').textContent = grupo.nome
            document.getElementById('grupoMeta').textContent = grupo.descricao || 'GRUPO DE PRÉVIA'
            
            const baseUrl = window.location.origin
            const grupoLink = `${baseUrl}/grupo.html?hash=${grupo.link_hash}`
            document.getElementById('grupoLinkDisplay').textContent = grupoLink
            
            document.getElementById('grupoNomeInput').value = grupo.nome || ''
            document.getElementById('grupoDescricaoInput').value = grupo.descricao || ''
            
            if (grupo.foto_url) {
                document.getElementById('grupoAvatar').innerHTML = `<img src="${grupo.foto_url}" alt="Avatar">`
                document.getElementById('grupoImagePreview').src = grupo.foto_url
                document.getElementById('grupoImagePreview').style.display = 'block'
                document.getElementById('grupoUploadHint').textContent = 'Foto carregada'
            }

            const loggedIn = await checkUser()
            isProprietario = loggedIn && user.id === grupo.vendedor_id

            document.getElementById('inputArea').style.display = isProprietario ? 'block' : 'none'
            document.getElementById('menuButton').style.display = isProprietario ? 'flex' : 'none'

            await loadPosts()
            
            if (!isProprietario) {
                await registrarVisualizacao()
            }
        }

        async function loadPosts() {
            const { data } = await supabaseClient
                .from('postagens')
                .select('*')
                .eq('grupo_id', grupo.id)
                .order('created_at', { ascending: false })

            posts = data || []
            renderPosts()
        }

        function renderPosts() {
            const area = document.getElementById('postsArea')
            
            if (posts.length === 0) {
                area.innerHTML = `
                    <div class="loading">
                        <p>Nenhuma postagem ainda</p>
                    </div>
                `
                return
            }

            area.innerHTML = posts.map(post => formatarPost(post)).join('')
        }

        function formatarPost(post) {
            const data = new Date(post.created_at).toLocaleDateString('pt-BR')
            
            let conteudoHtml = ''
            
            if (post.tipo === 'texto') {
                conteudoHtml = `<div class="post-content">${escapeHtml(post.conteudo)}</div>`
            } else if (post.tipo === 'imagem') {
                conteudoHtml = `
                    <img src="${escapeHtml(post.conteudo)}" class="post-media" onclick="openMedia('${escapeHtml(post.conteudo)}', 'image')">
                `
            } else if (post.tipo === 'video') {
                conteudoHtml = `
                    <video controls class="post-media" onclick="openMedia('${escapeHtml(post.conteudo)}', 'video')">
                        <source src="${escapeHtml(post.conteudo)}" type="video/mp4">
                    </video>
                `
            } else if (post.tipo === 'link') {
                try {
                    const linkData = JSON.parse(post.conteudo)
                    conteudoHtml = `
                        <div class="post-link">
                            <a href="${escapeHtml(linkData.url)}" target="_blank">${escapeHtml(linkData.texto || linkData.url)}</a>
                        </div>
                    `
                } catch {
                    conteudoHtml = `
                        <div class="post-link">
                            <a href="${escapeHtml(post.conteudo)}" target="_blank">${escapeHtml(post.conteudo)}</a>
                        </div>
                    `
                }
            }

            // Botão de apagar (só aparece para o proprietário)
            const deleteButton = isProprietario ? `
                <button class="delete-post-btn" onclick="showDeleteConfirm('${post.id}')">
                    <svg viewBox="0 0 24 24">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0h10"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </svg>
                </button>
            ` : ''

            return `
                <div class="post" id="post-${post.id}">
                    <div class="post-header">
                        <div class="post-author-avatar">
                            ${grupo.foto_url ? `<img src="${grupo.foto_url}">` : ''}
                        </div>
                        <div class="post-author-info">
                            <div class="post-author-name">${escapeHtml(grupo.nome)}</div>
                            <div class="post-time">${data}</div>
                        </div>
                        ${deleteButton}
                    </div>
                    ${conteudoHtml}
                    <div class="post-stats">
                        <div class="stat-item">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            </svg>
                            ${post.visualizacoes || 0}
                        </div>
                    </div>
                </div>
            `
        }

        // Funções para apagar post
        window.showDeleteConfirm = function(postId) {
            postToDelete = postId
            document.getElementById('confirmDeleteModal').classList.add('active')
        }

        window.cancelDelete = function() {
            postToDelete = null
            document.getElementById('confirmDeleteModal').classList.remove('active')
        }

        window.confirmDelete = async function() {
            if (!postToDelete) return

            const { error } = await supabaseClient
                .from('postagens')
                .delete()
                .eq('id', postToDelete)

            if (error) {
                showToast('Erro ao apagar')
            } else {
                showToast('Post apagado!')
                await loadPosts()
            }

            cancelDelete()
        }

        async function registrarVisualizacao() {
            try {
                await supabaseClient
                    .from('visualizacoes')
                    .insert({
                        postagem_id: posts[0]?.id,
                        lead_id: leadId
                    })
            } catch (error) {
                console.error('Erro ao registrar visualização:', error)
            }
        }

        window.sendPost = async function() {
            if (!isProprietario) return
            
            const input = document.getElementById('postInput')
            const texto = input.value.trim()
            
            if (!texto) return

            const sendButton = document.getElementById('sendButton')
            sendButton.disabled = true

            const { error } = await supabaseClient
                .from('postagens')
                .insert({
                    grupo_id: grupo.id,
                    tipo: 'texto',
                    conteudo: texto
                })

            if (error) {
                showToast('Erro ao publicar')
            } else {
                input.value = ''
                await loadPosts()
                document.getElementById('postsArea').scrollTop = 0
            }

            sendButton.disabled = false
        }

        window.selectMedia = function(tipo) {
            if (!isProprietario) return
            
            if (tipo === 'image') {
                document.getElementById('imageInput').click()
            } else if (tipo === 'video') {
                document.getElementById('videoInput').click()
            }
        }

        window.handleMediaSelect = async function(event, tipo) {
            if (!isProprietario) return
            
            const file = event.target.files[0]
            if (!file) return

            const maxSize = tipo === 'image' ? 10 * 1024 * 1024 : 50 * 1024 * 1024
            if (file.size > maxSize) {
                showToast(`Máximo ${tipo === 'image' ? '10MB' : '50MB'}`)
                return
            }

            showToast('Enviando...')

            try {
                const url = await uploadMedia(file, tipo)
                
                const { error } = await supabaseClient
                    .from('postagens')
                    .insert({
                        grupo_id: grupo.id,
                        tipo: tipo === 'image' ? 'imagem' : 'video',
                        conteudo: url
                    })

                if (error) throw error

                showToast('Publicado!')
                await loadPosts()
                document.getElementById('postsArea').scrollTop = 0
            } catch (error) {
                console.error(error)
                showToast('Erro ao enviar')
            }
        }

        window.showLinkInput = function() {
            if (!isProprietario) return
            document.getElementById('linkModal').classList.add('active')
        }

        window.closeLinkModal = function() {
            document.getElementById('linkModal').classList.remove('active')
            document.getElementById('linkUrl').value = ''
            document.getElementById('linkText').value = ''
        }

        window.sendLink = async function() {
            if (!isProprietario) return

            const url = document.getElementById('linkUrl').value.trim()
            const texto = document.getElementById('linkText').value.trim()

            if (!url) {
                showToast('Digite uma URL')
                return
            }

            const linkData = {
                url: url,
                texto: texto || url
            }

            const { error } = await supabaseClient
                .from('postagens')
                .insert({
                    grupo_id: grupo.id,
                    tipo: 'link',
                    conteudo: JSON.stringify(linkData)
                })

            if (error) {
                showToast('Erro ao adicionar link')
            } else {
                showToast('Link adicionado!')
                closeLinkModal()
                await loadPosts()
                document.getElementById('postsArea').scrollTop = 0
            }
        }

        window.openSettings = function() {
            if (!isProprietario) return
            document.getElementById('settingsModal').classList.add('active')
        }

        window.closeSettings = function() {
            document.getElementById('settingsModal').classList.remove('active')
        }

        window.copyGrupoLink = function() {
            const link = document.getElementById('grupoLinkDisplay').textContent
            navigator.clipboard.writeText(link)
            showToast('Link copiado!')
        }

        window.triggerGrupoUpload = function() {
            document.getElementById('grupoImageUpload').click()
        }

        window.handleGrupoImageUpload = async function(event) {
            if (!isProprietario) return

            const file = event.target.files[0]
            if (!file) return

            if (!file.type.match('image.*')) {
                showToast('Apenas imagens')
                return
            }

            if (file.size > 2 * 1024 * 1024) {
                showToast('Máximo 2MB')
                return
            }

            showToast('Enviando...')

            try {
                const url = await uploadMedia(file, 'avatar')
                
                const { error } = await supabaseClient
                    .from('grupos')
                    .update({ foto_url: url })
                    .eq('id', grupo.id)

                if (error) throw error

                grupo.foto_url = url
                document.getElementById('grupoAvatar').innerHTML = `<img src="${url}" alt="Avatar">`
                document.getElementById('grupoImagePreview').src = url
                document.getElementById('grupoImagePreview').style.display = 'block'
                document.getElementById('grupoUploadHint').textContent = 'Foto carregada'
                
                showToast('Foto atualizada!')
            } catch (error) {
                console.error(error)
                showToast('Erro ao enviar')
            }
        }

        window.saveGrupoSettings = async function() {
            if (!isProprietario) return

            const nome = document.getElementById('grupoNomeInput').value.trim()
            const descricao = document.getElementById('grupoDescricaoInput').value.trim()

            if (!nome) {
                showToast('Digite um nome')
                return
            }

            const { error } = await supabaseClient
                .from('grupos')
                .update({
                    nome: nome,
                    descricao: descricao
                })
                .eq('id', grupo.id)

            if (error) {
                showToast('Erro ao salvar')
            } else {
                grupo.nome = nome
                grupo.descricao = descricao
                document.getElementById('grupoNome').textContent = nome
                document.getElementById('grupoMeta').textContent = descricao || 'GRUPO DE PRÉVIA'
                showToast('Configurações salvas!')
                closeSettings()
            }
        }

        window.openMedia = function(src, tipo) {
            document.getElementById('mediaModal').classList.add('active')
            if (tipo === 'image') {
                document.getElementById('modalImage').src = src
                document.getElementById('modalImage').style.display = 'block'
                document.getElementById('modalVideo').style.display = 'none'
            } else {
                document.getElementById('modalVideo').src = src
                document.getElementById('modalVideo').style.display = 'block'
                document.getElementById('modalImage').style.display = 'none'
            }
        }

        window.closeMediaModal = function() {
            document.getElementById('mediaModal').classList.remove('active')
            const video = document.getElementById('modalVideo')
            if (video) video.pause()
        }

        async function init() {
            await loadGrupo()
            
            if (grupo) {
                supabaseClient
                    .channel(`grupo:${grupo.id}`)
                    .on('postgres_changes', 
                        { 
                            event: 'INSERT', 
                            schema: 'public', 
                            table: 'postagens',
                            filter: `grupo_id=eq.${grupo.id}`
                        },
                        () => {
                            loadPosts()
                        }
                    )
                    .subscribe()
            }
        }

        init()
    </script>
</body>
</html>
