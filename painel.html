<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEYGRAM • Painel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: #ffffff;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
        }

        .top-nav {
            padding: 20px 24px 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #000000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            stroke: white;
            stroke-width: 2;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #000000;
        }

        .logo-text span {
            font-weight: 300;
            color: #8e8e93;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #f2f2f7;
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-avatar svg {
            width: 22px;
            height: 22px;
            stroke: #8e8e93;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 80px 20px;
            background: #ffffff;
        }

        /* STATUS BLOCK SCREEN */
        .status-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 40px 24px;
        }

        .status-icon {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            border: 1px solid #f0f0f0;
        }

        .status-icon svg {
            width: 60px;
            height: 60px;
        }

        .status-icon.suspended svg {
            stroke: #FF9F0A;
        }

        .status-icon.banned svg {
            stroke: #FF3B30;
        }

        .status-title {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .status-message {
            font-size: 18px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 400px;
        }

        .status-support {
            background: #f8f8f8;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid #f0f0f0;
            width: 100%;
            max-width: 400px;
        }

        .support-number {
            font-size: 28px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .support-text {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 20px;
        }

        .support-button {
            background: #000000;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .support-button:hover {
            background: #1a1a1a;
            transform: scale(0.98);
        }

        .support-button svg {
            width: 20px;
            height: 20px;
            stroke: white;
        }

        .logout-link {
            color: #8e8e93;
            font-size: 14px;
            text-decoration: none;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 2px;
            cursor: pointer;
        }

        .logout-link:hover {
            color: #000000;
            border-bottom-color: #000000;
        }

        .welcome-section {
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 4px;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: #8e8e93;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 20px 16px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .stat-icon svg {
            width: 22px;
            height: 22px;
            stroke: #000000;
            fill: none;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #000000;
        }

        .stat-label {
            font-size: 13px;
            color: #8e8e93;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #8e8e93;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card-header-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 18px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-header-icon svg {
            width: 24px;
            height: 24px;
            stroke: #000000;
        }

        .card-header-text h3 {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
        }

        .card-header-text p {
            font-size: 14px;
            color: #8e8e93;
        }

        .grupo-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            margin-bottom: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .grupo-item:hover {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(0, 0, 0, 0.1);
        }

        .grupo-icon {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grupo-icon svg {
            width: 24px;
            height: 24px;
            stroke: #8e8e93;
        }

        .grupo-info {
            flex: 1;
        }

        .grupo-nome {
            font-size: 16px;
            font-weight: 500;
            color: #000000;
            margin-bottom: 4px;
        }

        .grupo-meta {
            font-size: 13px;
            color: #8e8e93;
        }

        .btn-add {
            width: 100%;
            padding: 16px;
            border: 1px dashed rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            background: transparent;
            color: #000000;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add svg {
            width: 20px;
            height: 20px;
            stroke: #000000;
        }

        .btn-add:hover {
            background: rgba(0, 0, 0, 0.02);
            border-color: #000000;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8e8e93;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 18px;
            font-size: 15px;
            color: #000000;
            background: rgba(0, 0, 0, 0.02);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #000000;
            background: #ffffff;
        }

        .upload-area {
            border: 1px dashed rgba(0, 0, 0, 0.1);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.02);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #000000;
        }

        .upload-icon svg {
            width: 32px;
            height: 32px;
            stroke: #8e8e93;
        }

        .upload-text {
            font-size: 14px;
            color: #8e8e93;
        }

        .preview-image {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            margin: 10px auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
            display: none;
        }

        .link-container {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 18px;
            padding: 16px;
            margin: 20px 0;
        }

        .link-label {
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .link-value {
            font-size: 14px;
            color: #000000;
            word-break: break-all;
            padding: 12px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #000000;
            color: #ffffff;
            width: 100%;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #000000;
            flex: 1;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .chat-list {
            margin-top: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar svg {
            width: 24px;
            height: 24px;
            stroke: #8e8e93;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 500;
            color: #000000;
        }

        .chat-meta {
            font-size: 13px;
            color: #8e8e93;
        }

        .chat-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8e8e93;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 10px 20px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            flex: 1;
            max-width: 120px;
        }

        .nav-item.active {
            background: rgba(0, 0, 0, 0.03);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: #8e8e93;
        }

        .nav-item.active svg {
            stroke: #000000;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
            color: #8e8e93;
        }

        .nav-item.active span {
            color: #000000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .modal-header svg {
            width: 28px;
            height: 28px;
            stroke: #000000;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(20px);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-nav">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <div class="logo-text">KEY<span>GRAM</span></div>
            </div>
            <div class="top-actions">
                <div class="user-avatar" id="userAvatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="content-area" id="mainContent">
            <!-- Conteúdo normal será substituído pelo JavaScript se necessário -->
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('chats')" id="navChats">
                <svg viewBox="0 0 24 24">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
                <span>Chats</span>
            </div>
            <div class="nav-item" onclick="switchTab('grupos')" id="navGrupos">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                </svg>
                <span>Grupos</span>
            </div>
            <div class="nav-item" onclick="openSettings()" id="navSettings">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62z"/>
                </svg>
                <span>Ajustes</span>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.04.04A10 10 0 0 0 12 17.66a10 10 0 0 0 6.36-2.62z"/>
                </svg>
                <h2>Configurações do Perfil</h2>
            </div>
            
            <div class="upload-area" onclick="triggerUpload()">
                <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <div class="upload-text">
                    <strong>Foto do perfil</strong><br>
                    <span id="uploadHint">Clique para adicionar</span>
                </div>
                <img id="imagePreview" class="preview-image" src="" alt="Preview">
            </div>
            
            <div class="input-group">
                <label class="input-label">Nome</label>
                <input type="text" id="modalName" placeholder="Como você quer ser chamado">
            </div>

            <div class="input-group">
                <label class="input-label">Descrição</label>
                <textarea id="modalDescription" placeholder="Fale sobre o que você oferece..."></textarea>
            </div>

            <div class="link-container">
                <div class="link-label">Seu link de chat</div>
                <div class="link-value" id="linkDisplay">Carregando...</div>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" onclick="copyLink()">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Copiar
                </button>
                <button class="btn btn-primary" onclick="saveSettings()">Salvar</button>
            </div>
            <button class="btn btn-outline" onclick="closeSettings()" style="margin-top: 10px;">Cancelar</button>
        </div>
    </div>

    <!-- Modal Criar Grupo -->
    <div class="modal" id="criarGrupoModal">
        <div class="modal-content">
            <div class="modal-header">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                </svg>
                <h2>Novo grupo</h2>
            </div>
            
            <div class="input-group">
                <label class="input-label">Nome do grupo</label>
                <input type="text" id="grupoNome" placeholder="Ex: Lançamento Verão">
            </div>

            <div class="input-group">
                <label class="input-label">Descrição (opcional)</label>
                <textarea id="grupoDescricao" placeholder="Sobre o que é este grupo..."></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" onclick="closeCriarGrupoModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="criarGrupo()">Criar</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>

            const toast = document.getElementById('toast')
            toast.textContent = message
            toast.classList.add('show')
            setTimeout(() => toast.classList.remove('show'), 2000)
        }

        function setLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId)
            if (isLoading) {
                btn.classList.add('btn-loading')
                btn.disabled = true
            } else {
                btn.classList.remove('btn-loading')
                btn.disabled = false
            }
        }

        // MOSTRAR TELA DE BLOQUEIO
        function showBlockScreen(status) {
            const mainContent = document.getElementById('mainContent')
            const isSuspended = status === 'suspended'
            const isBanned = status === 'banned'
            
            const iconSvg = isSuspended ? 
                `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/>` :
                `<circle cx="12" cy="12" r="10"/><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`
            
            const title = isSuspended ? 'Acesso Suspenso' : 'Conta Banida'
            
            const message = isSuspended ? 
                `A sua conta foi temporariamente suspensa por violação dos nossos termos de serviço. Durante este período, não poderá aceder ao painel nem utilizar as funcionalidades da plataforma.` :
                `A sua conta foi permanentemente banida devido a violações graves dos nossos termos de serviço. Esta decisão é irreversível e não poderá mais aceder à plataforma.`

            mainContent.innerHTML = `
                <div class="status-block">
                    <div class="status-icon ${isSuspended ? 'suspended' : 'banned'}">
                        <svg viewBox="0 0 24 24" fill="none">
                            ${iconSvg}
                        </svg>
                    </div>
                    <h1 class="status-title">${title}</h1>
                    <p class="status-message">${message}</p>
                    
                    <div class="status-support">
                        <div class="support-number">83 333 3264</div>
                        <div class="support-text">Linha de suporte disponível de segunda a sexta, das 8h às 18h. Respondemos em até 24h úteis.</div>
                        <a href="https://wa.me/258833333264?text=Olá! Preciso de ajuda com minha conta KEYGRAM. Meu status é: ${status}" 
                           class="support-button" target="_blank">
                            <svg viewBox="0 0 24 24">
                                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                            </svg>
                            Falar com suporte
                        </a>
                    </div>
                    
                    <span class="logout-link" onclick="handleLogout()">Sair da conta</span>
                </div>
            `
            
            // Esconder bottom nav
            document.querySelector('.bottom-nav').style.display = 'none'
        }

        // MOSTRAR CONTEÚDO NORMAL
        function showNormalContent() {
            const mainContent = document.getElementById('mainContent')
            document.querySelector('.bottom-nav').style.display = 'flex'
            
            mainContent.innerHTML = `
                <!-- Welcome Section -->
                <div class="welcome-section">
                    <h1 class="welcome-title" id="welcomeName">Bem-vindo</h1>
                    <p class="welcome-subtitle">Gerencie suas conversas e grupos</p>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="chatCount">0</div>
                        <div class="stat-label">Conversas ativas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                        <div class="stat-value" id="linkClicks">0</div>
                        <div class="stat-label">Visualizações</div>
                    </div>
                </div>

                <!-- Abas: Chats ou Grupos -->
                <div id="chatsSection">
                    <div class="section-title">Conversas ativas</div>
                    <div class="chat-list" id="conversasList">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" width="40" height="40" style="stroke: #8e8e93; margin-bottom: 16px;">
                                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                            </svg>
                            <p>Nenhuma conversa ativa</p>
                        </div>
                    </div>
                </div>

                <div id="gruposSection" class="hidden">
                    <div class="section-title">Grupos de prévia</div>
                    <button class="btn-add" onclick="openCriarGrupoModal()">
                        <svg viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Novo grupo
                    </button>
                    <div id="gruposList">
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" width="40" height="40" style="stroke: #8e8e93; margin-bottom: 16px;">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="16"/>
                                <line x1="8" y1="12" x2="16" y2="12"/>
                            </svg>
                            <p>Nenhum grupo criado</p>
                        </div>
                    </div>
                </div>
            `
            
            // Carregar dados
            loadVendedor()
            loadConversas()
            setInterval(loadConversas, 30000)
        }

        async function checkUser() {
            const { data: { user: currentUser } } = await supabaseClient.auth.getUser()
            user = currentUser
            if (!user) {
                window.location.href = 'index.html'
                return false
            }
            
            // Verificar status do usuário
            const { data } = await supabaseClient
                .from('vendedores')
                .select('status')
                .eq('id', user.id)
                .single()
            
            userStatus = data?.status || 'active'
            
            if (userStatus === 'suspended' || userStatus === 'banned') {
                showBlockScreen(userStatus)
                return false
            }
            
            showNormalContent()
            return true
        }

        // Upload para Storage
        async function uploadFoto(file) {
            const fileExt = file.name.split('.').pop()
            const fileName = `${user.id}_${Date.now()}.${fileExt}`
            const filePath = `avatars/${fileName}`

            const { error } = await supabaseClient.storage
                .from('keygram')
                .upload(filePath, file)

            if (error) throw error

            const { data: { publicUrl } } = supabaseClient.storage
                .from('keygram')
                .getPublicUrl(filePath)

            return publicUrl
        }

        window.triggerUpload = function() {
            document.getElementById('imageUpload').click()
        }

        window.handleImageUpload = async function(event) {
            const file = event.target.files[0]
            if (!file) return

            if (!file.type.match('image.*')) {
                showToast('Apenas imagens são permitidas')
                return
            }
            
            if (file.size > 2 * 1024 * 1024) {
                showToast('Imagem deve ter no máximo 2MB')
                return
            }

            try {
                showToast('Enviando imagem...')
                const fotoUrl = await uploadFoto(file)
                vendedorData.foto_url = fotoUrl
                
                document.getElementById('imagePreview').src = fotoUrl
                document.getElementById('imagePreview').style.display = 'block'
                document.getElementById('uploadHint').textContent = file.name
                
                const avatar = document.getElementById('userAvatar')
                avatar.innerHTML = `<img src="${fotoUrl}" alt="Avatar">`
                
                showToast('Imagem enviada!')
            } catch (error) {
                showToast('Erro ao enviar imagem')
            }
        }

        async function loadUserMetrics(userId) {
            try {
                const { count: totalConversas } = await supabaseClient
                    .from('conversas')
                    .select('*', { count: 'exact', head: true })
                    .eq('vendedor_id', userId)

                const { count: totalVisitas } = await supabaseClient
                    .from('visitas')
                    .select('*', { count: 'exact', head: true })
                    .eq('vendedor_id', userId)

                document.getElementById('chatCount').textContent = totalConversas || 0
                document.getElementById('linkClicks').textContent = totalVisitas || 0
            } catch (error) {
                console.error('Erro ao carregar métricas:', error)
            }
        }

        async function loadVendedor() {
            if (!user) return

            let { data } = await supabaseClient
                .from('vendedores')
                .select('*')
                .eq('id', user.id)
                .single()

            if (!data) {
                const hash = Math.random().toString(36).substring(2, 15) + 
                            Math.random().toString(36).substring(2, 15)
                
                const { data: newData } = await supabaseClient
                    .from('vendedores')
                    .insert({
                        id: user.id,
                        nome: user.user_metadata?.name || 'Usuário',
                        descricao: '',
                        link_hash: hash
                    })
                    .select()
                    .single()
                
                data = newData
            }

            if (data && !data.link_hash) {
                const hash = Math.random().toString(36).substring(2, 15) + 
                            Math.random().toString(36).substring(2, 15)
                
                await supabaseClient
                    .from('vendedores')
                    .update({ link_hash: hash })
                    .eq('id', user.id)
                
                data.link_hash = hash
            }

            if (data) {
                vendedorData = data
                
                document.getElementById('welcomeName').textContent = data.nome ? `Olá, ${data.nome}` : 'Bem-vindo'
                document.getElementById('modalName').value = data.nome || ''
                document.getElementById('modalDescription').value = data.descricao || ''
                
                await loadUserMetrics(user.id)
                
                if (data.foto_url) {
                    const avatar = document.getElementById('userAvatar')
                    avatar.innerHTML = `<img src="${data.foto_url}" alt="Avatar">`
                    document.getElementById('imagePreview').src = data.foto_url
                    document.getElementById('imagePreview').style.display = 'block'
                    document.getElementById('uploadHint').textContent = 'Foto carregada'
                }
                
                if (data.link_hash) {
                    const baseUrl = window.location.origin
                    const chatUrl = `${baseUrl}/chat.html?hash=${data.link_hash}`
                    document.getElementById('linkDisplay').textContent = chatUrl
                }
            }
        }

        window.saveSettings = async function() {
            const nome = document.getElementById('modalName').value
            const descricao = document.getElementById('modalDescription').value

            const { error } = await supabaseClient
                .from('vendedores')
                .upsert({
                    id: user.id,
                    nome: nome,
                    descricao: descricao,
                    foto_url: vendedorData.foto_url || null
                })

            if (error) {
                showToast('Erro ao salvar')
            } else {
                showToast('Perfil atualizado')
                document.getElementById('welcomeName').textContent = nome ? `Olá, ${nome}` : 'Bem-vindo'
                closeSettings()
            }
        }

        window.copyLink = function() {
            const link = document.getElementById('linkDisplay').textContent
            navigator.clipboard.writeText(link)
            showToast('Link copiado')
        }

        // GRUPOS
        async function loadGrupos() {
            if (!user) return

            const { data } = await supabaseClient
                .from('grupos')
                .select('*')
                .eq('vendedor_id', user.id)
                .order('created_at', { ascending: false })

            grupos = data || []
            renderGrupos()
        }

        function renderGrupos() {
            const lista = document.getElementById('gruposList')
            
            if (grupos.length === 0) {
                lista.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="40" height="40" style="stroke: #8e8e93; margin-bottom: 16px;">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <p>Nenhum grupo criado</p>
                    </div>
                `
                return
            }

            lista.innerHTML = grupos.map(g => `
                <div class="grupo-item" onclick="window.location.href='grupo.html?hash=${g.link_hash}'">
                    <div class="grupo-icon">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                        </svg>
                    </div>
                    <div class="grupo-info">
                        <div class="grupo-nome">${g.nome}</div>
                        <div class="grupo-meta">${g.descricao || 'Sem descrição'}</div>
                    </div>
                </div>
            `).join('')
        }

        // FUNÇÕES GLOBAIS ADICIONADAS
        window.openCriarGrupoModal = function() {
            document.getElementById('criarGrupoModal').classList.add('active')
        }

        window.closeCriarGrupoModal = function() {
            document.getElementById('criarGrupoModal').classList.remove('active')
            document.getElementById('grupoNome').value = ''
            document.getElementById('grupoDescricao').value = ''
        }

        window.criarGrupo = async function() {
            const nome = document.getElementById('grupoNome').value.trim()
            const descricao = document.getElementById('grupoDescricao').value.trim()

            if (!nome) {
                showToast('Digite um nome para o grupo')
                return
            }

            const hash = Math.random().toString(36).substring(2, 15) + 
                        Math.random().toString(36).substring(2, 15)

            const { error } = await supabaseClient
                .from('grupos')
                .insert({
                    vendedor_id: user.id,
                    nome: nome,
                    descricao: descricao,
                    link_hash: hash
                })

            if (error) {
                showToast('Erro ao criar grupo')
            } else {
                showToast('Grupo criado!')
                closeCriarGrupoModal()
                await loadGrupos()
            }
        }

        // CONVERSAS
        async function loadConversas() {
            if (!user) return

            const { data } = await supabaseClient
                .from('conversas')
                .select('*')
                .eq('vendedor_id', user.id)
                .eq('status', 'active')
                .order('created_at', { ascending: false })

            const lista = document.getElementById('conversasList')
            if (!data || data.length === 0) {
                lista.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" width="40" height="40" style="stroke: #8e8e93; margin-bottom: 16px;">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                        </svg>
                        <p>Nenhuma conversa ativa</p>
                    </div>
                `
                return
            }

            lista.innerHTML = data.map(c => `
                <div class="chat-item" onclick="window.location.href='chat-vendedor.html?conv=${c.id}'">
                    <div class="chat-avatar">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">Lead #${c.lead_id.slice(0, 8)}</div>
                        <div class="chat-meta">${new Date(c.created_at).toLocaleDateString('pt-BR')}</div>
                    </div>
                    <div class="chat-badge"></div>
                </div>
            `).join('')
        }

        // NAVEGAÇÃO
        window.switchTab = function(tab) {
            if (userStatus !== 'active') return
            
            const navChats = document.getElementById('navChats')
            const navGrupos = document.getElementById('navGrupos')
            const navSettings = document.getElementById('navSettings')
            const chatsSection = document.getElementById('chatsSection')
            const gruposSection = document.getElementById('gruposSection')

            if (!navChats || !navGrupos || !navSettings || !chatsSection || !gruposSection) return

            navChats.classList.remove('active')
            navGrupos.classList.remove('active')
            navSettings.classList.remove('active')

            if (tab === 'chats') {
                navChats.classList.add('active')
                chatsSection.classList.remove('hidden')
                gruposSection.classList.add('hidden')
            } else if (tab === 'grupos') {
                navGrupos.classList.add('active')
                chatsSection.classList.add('hidden')
                gruposSection.classList.remove('hidden')
                loadGrupos()
            }
        }

        window.openSettings = function() {
            if (userStatus !== 'active') return
            
            document.getElementById('modalName').value = vendedorData.nome || ''
            document.getElementById('modalDescription').value = vendedorData.descricao || ''
            if (vendedorData.foto_url) {
                document.getElementById('imagePreview').src = vendedorData.foto_url
                document.getElementById('imagePreview').style.display = 'block'
                document.getElementById('uploadHint').textContent = 'Foto carregada'
            }
            
            document.getElementById('settingsModal').classList.add('active')
            
            document.getElementById('navChats').classList.remove('active')
            document.getElementById('navGrupos').classList.remove('active')
            document.getElementById('navSettings').classList.add('active')
        }

        window.closeSettings = function() {
            document.getElementById('settingsModal').classList.remove('active')
            document.getElementById('navChats').classList.add('active')
            document.getElementById('navSettings').classList.remove('active')
        }

        window.handleLogout = async function() {
            await supabaseClient.auth.signOut()
            window.location.href = 'index.html'
        }

        async function init() {
            await checkUser()
        }

        init()
    </script>
